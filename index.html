<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi primer Proyecto Web</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            text-align: center;
            border: 1px solid #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            background-color: #0a0a0a;
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.05);
        }

        header {
            margin-bottom: 40px;
            border-bottom: 2px solid #00ffff;
            padding-bottom: 20px;
        }

        h1 {
            color: #00ffff;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        h2 {
            color: #00ffff;
            margin-top: 40px;
            font-size: 1.5rem;
        }

        p {
            font-size: 1.2rem;
            color: #cccccc;
            line-height: 1.8;
        }

        strong {
            color: #00ffff;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Mi primer Proyecto Web</h1>
        </header>

        <main>
            <h1>Bienvenido a mi proyecto</h1>
            <p>Proyecto Colaborativo con <strong>Github</strong></p>
            
            <h2>Sección nueva agregada</h2>
            <p>Esta sección fue creada en una rama para practicar el flujo de trabajo profesional.</p>
        </main>
    </div>

</body>
</html>
